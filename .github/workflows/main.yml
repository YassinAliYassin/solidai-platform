name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  test-config-service:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install config_service test deps
        working-directory: packages/sre/config_service
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install pytest pyjwt cryptography python-multipart \
            croniter httpx ruamel.yaml prometheus_client sqlalchemy \
            structlog watchdog fastapi pydantic pydantic-settings email-validator

      - name: Run config_service tests
        working-directory: packages/sre/config_service
        env:
          ENCRYPTION_KEY: ${{ secrets.CONFIG_SERVICE_ENCRYPTION_KEY }}
        run: |
          . .venv/bin/activate
          pytest -q

  lint-web-ui:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        working-directory: packages/sre/web_ui
        run: npm ci

      - name: Typecheck
        working-directory: packages/sre/web_ui
        run: npx tsc --noEmit

      - name: Lint
        working-directory: packages/sre/web_ui
        run: npm run lint

  lint-cloud-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        working-directory: packages/cloud/frontend
        run: npm ci

      - name: Typecheck
        working-directory: packages/cloud/frontend
        run: npx tsc -b

      - name: Lint
        working-directory: packages/cloud/frontend
        run: npm run lint

  test-health-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test deps
        working-directory: packages/sre/health-monitor
        run: pip install pytest pytest-asyncio

      - name: Run health-monitor tests
        working-directory: packages/sre/health-monitor
        run: pytest -q

  test-sre-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        working-directory: packages/sre/sre-agent
        run: uv sync --all-extras --dev

      - name: Run sre-agent tests
        working-directory: packages/sre/sre-agent
        run: uv run pytest -q
