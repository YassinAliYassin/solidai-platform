name: Auto Deploy
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Get Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Verify Build
        run: ls -R dist

      - name: Install lftp
        run: sudo apt-get install -y lftp 2>/dev/null

      - name: Deploy to cPanel via SFTP
        run: |
          lftp -u solid,${{ secrets.FTP_PASSWORD }} sftp://102.208.231.15 -e "
            set sftp:connect-program 'ssh -a -x -o StrictHostKeyChecking=no';
            set net:max-retries 5;
            set net:timeout 60;
            set net:reconnect-interval-base 5;
            cd /home/solid/solidsolutions.africa;
            rm -rf *;
            mirror -R ./dist .;
            bye
          "
